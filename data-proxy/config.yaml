port: "7095"

control_host: "http://127.0.0.1:7081"

listen_ports:
  - tcp:8001
  - tcp:8002
  - udp:8002
  - tcp:8003
  - udp:8003
  - tcp:8004
  - tcp:8005
  - udp:443   # HTTP3/QUIC
  - tcp:443   # HTTPS

rate_limit:
  qps: 1000
  burst: 2000
  clean_interval: 5

aggregator:
  buffer_size: 5120
  batch_timeout_ms: 10

node:
  provider: "Vultr"
  continent: "NorthAmerica"
  country: "US"
  city: "Chicago"
  ip:
    private: "0.0.0.0"
    public: "173.199.92.182"